name: Code Review

"on":
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: read
  # Required by anthropics/claude-code-action: the action fetches an OIDC
  # token to authenticate against Anthropic's service even when
  # `claude_code_oauth_token` is supplied. Removing this permission causes
  # startup to fail with "Could not fetch an OIDC token".
  id-token: write

jobs:
  claude-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@38ec876110f9fbf8b950c79f534430740c3ac009 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Please review this pull request and provide feedback using the following template:

            ## Summary
            Brief overview (2-3 sentences)

            ## Strengths
            What's done well?

            ## Security Concerns
            Vulnerabilities? 🔴 BLOCKING | 🟡 HIGH | 🟢 LOW

            ## Problems
            Critical issues blocking merge (mark 🔴)
            Consider priority greater than Minor as "Blocking"

            ## Code Quality
            Non-blocking improvements for educational purposes or for future GitHub Issues

            ## CLAUDE.md Adherence
            ✅/❌ Coverage, linting, types, patterns, commits

            ## Testing
            Test quality evaluation
            Insufficient testing is Blocking (mark 🔴)

            ## Documentation
            Docs completeness


            ## Verdict
            ✅ LGTM | 🔄 CHANGES_REQUESTED | 💬 COMMENTS
            **Reasoning:** Specific references

            Use the repository's CLAUDE.md for guidance on style and conventions. Be constructive and helpful in your feedback.

            Use `gh pr comment` with your Bash tool to leave your review as a comment on the PR.

          # Security: Restrict Claude to read-only GitHub CLI commands plus
          # gh pr comment for posting review results.
          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
